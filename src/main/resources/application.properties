spring.application.name=EnterpriseStorageApplication

server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/storage_db

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# MinIO
app.storage.endpoints=http://localhost:9000
app.storage.access-key=admin
app.storage.secret-key=admin123
app.storage.region=us-east-1

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.root=INFO
logging.level.com.webcom.storage=DEBUG
